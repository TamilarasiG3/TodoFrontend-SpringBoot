<!DOCTYPE html>
<html>

<head>

<title>Todos</title>

<link rel="stylesheet" href="style.css">

</head>


<body onload="checkLogin()">


<div class="container">


<div class="header">

<h1>
My Todos
</h1>


<button class="logout"
onclick="logout()">
Logout
</button>


</div>



<div class="todo-input">


<input id="todoInput"
       placeholder="Enter task">


<button onclick="addTodo()">
Add
</button>


</div>



<ul id="todoList"></ul>



</div>



<script src="main.js"></script>


</body>

</html>
