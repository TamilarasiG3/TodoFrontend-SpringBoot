<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Login</h1>

    <input id="loginEmail" 
           type="email" 
           placeholder="Email">

    <input id="loginPassword" 
           type="password" 
           placeholder="Password">


    <button onclick="login()">
        Login
    </button>


    <p>
        New user?
        <a href="register.html">
            Register
        </a>
    </p>

</div>


<script src="main.js"></script>

</body>

</html>
